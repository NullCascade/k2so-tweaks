[mod-setting-description]
nulls-k2so-crushing-industry-ratios=Zmienia przemysł kruszenia tak, aby wykorzystywał współczynniki przeliczeniowe rudy na płytkę z K2 oraz dodaje recepturę do wzbogacania pokruszonych rud. W rezultacie jest to osłabienie przed wprowadzeniem nauki chemicznej oraz wzmocnienie po dodaniu Vulcanusa/Gleby, co sprawia, że wzbogacanie rudy ma zastosowanie przez większość gry przy zainstalowanym przemyśle kruszenia.
nulls-k2so-expanded-alternate-recipes=Dodaje dodatkowe alternatywne receptury dla półproduktów, aby zmiany wprowadzone przez Krastorio w tych składnikach były bardziej opłacalne na planetach z modyfikacjami.
nulls-k2so-expanded-matter-recipes=Dodaje dodatkowe receptury konwersji materii, głównie w celu ułatwienia pozyskiwania podstawowych zasobów K2SO na planetach, gdzie w przeciwnym razie nie byłoby to opłacalne.
nulls-k2so-maraxsis-quantum-revert=Cofa wymagania budowlane i zmiany nazwy wprowadzone przez Maraxsis w odniesieniu do komputera kwantowego.
nulls-k2so-modify-recycling-results=Próbuje naprawić różne niespójności związane z recyklingiem podczas gry z innymi modami.
nulls-k2so-standardize-electrolysis=Przenosi receptury elektrolizy do zakładu elektrolizy K2 (lub zakładu elektromagnetycznego). Obecnie dotyczy to wyłącznie Maraxsis. Jeśli opcja ta jest wyłączona, maszyny te nadal mogą być używane, ale nie jest to wymagane.
nulls-k2so-standardize-stack-sizes=Wprowadza zasady K2 dotyczące rozmiarów stosów do innych modów. Oznacza to, że większość przedmiotów można układać w stosy po 200 sztuk, a większość maszyn – po 50 sztuk. Nie wprowadza się żadnych zmian w pojemności rakiet.

